<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Professional Edge — Semester 1: The Discovery Phase — Post assessment | Rumination Life Academy</title>
<style>
  :root {
    --blue: #29ABE2;
    --blue-dark: #1B8FC4;
    --green: #7AC143;
    --green-dark: #5FA62F;
    --ink: #16384D;
    --grey: #6B7E8C;
    --line: #D8E6EF;
    --bg: #FFFFFF;
    --soft: #F3F9FD;
    --white: #FFFFFF;
    --accent: var(--green);
    --accent-soft: rgba(122,193,67,.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Aptos', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.5;
    padding: 0 16px 64px; min-height: 100vh;
  }
  .wrap { max-width: 640px; margin: 0 auto; }

  .topbar {
    display: flex; align-items: center;
    padding: 18px 4px 16px; border-bottom: 2px solid var(--line); margin-bottom: 24px;
  }
  .topbar img { height: 64px; width: auto; display: block; max-width: 100%; }

  .brand { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; font-weight: 700; }
  .phase-tag { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--grey); margin-bottom: 14px; font-weight: 600; }
  h1 { font-size: 26px; margin-bottom: 14px; line-height: 1.25; color: var(--ink); }
  .sub { color: var(--grey); font-size: 15px; margin-bottom: 28px; }

  .card { background: var(--soft); border: 1px solid var(--line); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
  label.field { display: block; font-size: 14px; color: var(--grey); margin-bottom: 8px; font-weight: 600; }
  input[type=text] {
    width: 100%; padding: 13px 14px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--white); color: var(--ink); font-size: 16px;
  }
  input[type=text]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  select {
    width: 100%; padding: 13px 14px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--white); color: var(--ink); font-size: 16px; appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%236B7E8C' d='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 14px center; background-size: 18px;
  }
  select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  .q { background: var(--white); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
  .q-num { color: var(--accent); font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  .q-text { font-size: 16px; margin-bottom: 14px; color: var(--ink); }
  .scale { display: flex; gap: 7px; }
  .scale-btn {
    flex: 1; padding: 12px 4px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--white); color: var(--ink); cursor: pointer; text-align: center; transition: all .12s;
  }
  .scale-btn .n { font-size: 18px; font-weight: 700; display: block; }
  .scale-btn .lbl { font-size: 10px; color: var(--grey); margin-top: 3px; display: block; }
  .scale-btn.active { background: var(--accent); border-color: var(--accent); color: var(--white); }
  .scale-btn.active .lbl { color: var(--white); }
  .scale-btn:hover { border-color: var(--accent); }

  .submit {
    width: 100%; padding: 16px; border-radius: 12px; border: none;
    background: var(--accent); color: var(--white); font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 8px;
  }
  .submit:disabled { opacity: .45; cursor: not-allowed; }

  .msg { text-align: center; padding: 50px 16px; }
  .msg img { height: 72px; margin-bottom: 20px; max-width: 100%; }
  .msg h2 { font-size: 24px; margin-bottom: 10px; color: var(--accent); }
  .hidden { display: none; }
  .progress { font-size: 13px; color: var(--grey); margin-bottom: 16px; text-align: right; font-weight: 600; }
  .err { color: #D64545; font-size: 14px; margin-top: 10px; text-align: center; }
</style>
</head>

    <p class="sub">Your post responses are in. Thank you.</p>

<script>
  // ===== CONFIG =====
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzvLyjnhK4iZxa5Tn84afS4vVGK_yI78utdJJNNvn_kzHNVEo7Pzo9np_7YF_CkVb6Mag/exec";
  const PHASE = "Post";

  const QUESTIONS = ["I now carry myself more like an emerging professional than a student.", "I now hold my focus without letting my phone pull me off.", "I now have a clearer sense of what I am genuinely good at.", "I now use a wider range of words comfortably when I express myself.", "I now get my real priorities done on most days.", "I now adapt to change and new situations without much trouble.", "I now hold a steady sense of my own worth in most situations.", "I now stay steady under pressure instead of being thrown by it.", "I now communicate at a solid level in both speech and writing.", "I now learn in ways that actually work with how my brain learns best.", "When I fail at something, I now go back and try a different way.", "I now adjust how I communicate to suit whoever I am speaking with.", "I now know my core strengths and use them with confidence.", "I now find the right words for what I mean more easily.", "I now manage my time, tasks and energy with real discipline.", "I now approach things with a professional mindset more than a school one.", "I now treat what I am not yet good at as something I can build, and I act on it.", "I now speak and present with real confidence, whoever is in the room.", "I now manage my phone and screens rather than them managing me.", "I now pick up new things more easily than I used to.", "I now recover well and keep going when something sets me back.", "I now use methods that help things stick in my memory.", "I now have a clear, settled sense of who I am and what I stand for.", "I now explain my ideas clearly enough that people usually follow me the first time."];
  const SCALE = [
    { n: 1, lbl: "Not at all" },
    { n: 2, lbl: "Slightly" },
    { n: 3, lbl: "Somewhat" },
    { n: 4, lbl: "Mostly" },
    { n: 5, lbl: "Completely" }
  ];

  let scores = new Array(24).fill(null);

  const qContainer = document.getElementById("questions");
  const submitBtn = document.getElementById("submitBtn");
  const progressEl = document.getElementById("progress");
  const errEl = document.getElementById("err");

  function renderQuestions() {
    qContainer.innerHTML = "";
    QUESTIONS.forEach(function (text, i) {
      const q = document.createElement("div");
      q.className = "q";
      let scaleHtml = '<div class="scale">';
      SCALE.forEach(function (s) {
        scaleHtml += '<button class="scale-btn" data-q="' + i + '" data-v="' + s.n + '">' +
          '<span class="n">' + s.n + '</span><span class="lbl">' + s.lbl + '</span></button>';
      });
      scaleHtml += '</div>';
      q.innerHTML = '<div class="q-num">Q' + (i + 1) + '</div>' +
        '<div class="q-text">' + text + '</div>' + scaleHtml;
      qContainer.appendChild(q);
    });
    bindScale();
    updateProgress();
  }

  function bindScale() {
    document.querySelectorAll(".scale-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        const qi = parseInt(btn.dataset.q, 10);
        const v = parseInt(btn.dataset.v, 10);
        scores[qi] = v;
        const parent = btn.parentElement;
        parent.querySelectorAll(".scale-btn").forEach(function (b) { b.classList.remove("active"); });
        btn.classList.add("active");
        updateProgress();
      });
    });
  }

  function updateProgress() {
    const answered = scores.filter(function (s) { return s !== null; }).length;
    progressEl.textContent = answered + " of 24 answered";
    const nameOk = document.getElementById("name").value.trim().length > 0;
    const rollOk = document.getElementById("rollNo").value.trim().length > 0;
    const collegeOk = document.getElementById("college").value.trim().length > 0;
    const programmeOk = document.getElementById("programme").value.trim().length > 0;
    const sectionOk = document.getElementById("section").value.trim().length > 0;
    const streamOk = document.getElementById("stream").value.trim().length > 0;
    submitBtn.disabled = !(answered === 24 && nameOk && rollOk && collegeOk && programmeOk && sectionOk && streamOk);
  }

  ["name", "rollNo", "college", "programme", "section", "stream"].forEach(function (id) {
    const el = document.getElementById(id);
    el.addEventListener("input", updateProgress);
    el.addEventListener("change", updateProgress);
  });

  submitBtn.addEventListener("click", function () {
    errEl.classList.add("hidden");
    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";

    const total = scores.reduce(function (a, b) { return a + b; }, 0);
    const payload = {
      name: document.getElementById("name").value.trim(),
      rollNo: document.getElementById("rollNo").value.trim(),
      college: document.getElementById("college").value.trim(),
      programme: document.getElementById("programme").value.trim(),
      section: document.getElementById("section").value.trim(),
      stream: document.getElementById("stream").value,
      phase: PHASE,
      scores: scores,
      total: total
    };

    fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    }).then(function () {
      document.getElementById("form-view").classList.add("hidden");
      document.getElementById("done-view").classList.remove("hidden");
      window.scrollTo(0, 0);
    }).catch(function () {
      errEl.textContent = "Something went wrong. Please try again.";
      errEl.classList.remove("hidden");
      submitBtn.disabled = false;
      submitBtn.textContent = "Submit post assessment";
    });
  });

  renderQuestions();
</script>
